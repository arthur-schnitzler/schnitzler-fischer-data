name: Neue Listen aus back-Elementen rechnen

on:
  workflow_dispatch:  # Manuell auslösbar

jobs:
  download-transform-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Run mentions-in-back.py (extract PMB IDs from back elements)
        run: uv run ./pyscripts/mentions-in-back.py

      - name: Run create-lists.py
        run: uv run ./pyscripts/create-lists.py

      - name: Commit and push indices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indices/*
          git commit -m "Automatisch generierte Indexdateien aktualisiert" || echo "Keine Änderungen zu committen"
          git push

